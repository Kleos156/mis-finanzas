<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Mis Finanzas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F7F6F2;--surface:#FFFFFF;--surface2:#F0EFE9;
    --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
    --text:#1A1A17;--text2:#6B6A64;--text3:#9E9D97;
    --green:#3B6D11;--green-bg:#EAF3DE;--green-mid:#639922;
    --amber:#854F0B;--amber-bg:#FAEEDA;--amber-mid:#BA7517;
    --red:#A32D2D;--red-bg:#FCEBEB;--red-mid:#E24B4A;
    --accent:#1A1A17;--radius:12px;--radius-sm:8px;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#111110;--surface:#1C1C1A;--surface2:#252523;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --text:#F0EFE9;--text2:#9E9D97;--text3:#6B6A64;
    --green:#97C459;--green-bg:#17340A;--green-mid:#639922;
    --amber:#EF9F27;--amber-bg:#412402;--amber-mid:#BA7517;
    --red:#F09595;--red-bg:#501313;--red-mid:#E24B4A;--accent:#F0EFE9;
  }}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5;}

  .loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text2);}
  .spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--text2);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .setup-page{padding:2rem 1.5rem;display:flex;justify-content:center;align-items:center;min-height:100vh;}
  .card{background:var(--surface);border:.5px solid var(--border);border-radius:20px;padding:2rem 1.5rem;width:100%;max-width:400px;}
  .field{margin-bottom:1rem;}
  .field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;text-transform:uppercase;}
  .field input{width:100%;font-family:'DM Mono',monospace;padding:10px;border:.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);}
  .btn-primary{width:100%;padding:13px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--radius);font-weight:500;cursor:pointer;}

  .app{max-width:520px;margin:0 auto;}
  .header{background:var(--surface);border-bottom:.5px solid var(--border);padding:1rem 1.25rem;position:sticky;top:0;z-index:20;}
  .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .sync-dot{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
  .online .dot{background:var(--green-mid);}

  .month-tabs{display:flex;gap:4px;overflow-x:auto;padding:0.5rem 1.25rem;background:var(--surface);scrollbar-width:none;}
  .tab{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;border:.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;}
  .tab.active{background:var(--accent);color:var(--bg);border-color:transparent;}

  .content{padding:1rem 1.25rem 5rem;}
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.5rem;}
  .summary-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:1rem;}
  .summary-card.full{grid-column:span 2;}
  .s-label{font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:2px;}
  .s-value{font-size:20px;font-weight:600;}

  .cat-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:10px;}
  .cat-header{display:flex;justify-content:space-between;margin-bottom:10px;}
  .cat-info{display:flex;align-items:center;gap:8px;}
  .cat-icon{width:32px;height:32px;background:var(--surface2);display:flex;align-items:center;justify-content:center;border-radius:8px;}
  
  .progress-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:10px;}
  .progress-fill{height:100%;background:var(--green-mid);transition:width .3s;}
  .progress-fill.over{background:var(--red-mid);}

  .entry-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-top:.5px solid var(--border);}
  .add-form{display:flex;gap:5px;margin-top:10px;}
  .add-form input{flex:1;padding:6px;border:.5px solid var(--border2);border-radius:4px;background:var(--surface2);font-size:13px;}
  .add-form button{padding:6px 12px;background:var(--accent);color:var(--bg);border:none;border-radius:4px;font-size:13px;}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;z-index:100;}
  .modal{background:var(--surface);width:100%;padding:1.5rem;border-radius:20px 20px 0 0;}
  .modal-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:.5px solid var(--border);}
  .modal-row input{width:80px;padding:5px;text-align:right;}
</style>
</head>
<body>

<div id="loading" class="loading"><div class="spinner"></div><span>Cargando datos...</span></div>

<div id="setup" class="setup-page" style="display:none">
  <div class="card">
    <h2 style="margin-bottom:1rem">Configuración Firebase</h2>
    <div class="field"><label>API Key</label><input id="c-key" type="text" /></div>
    <div class="field"><label>Database URL</label><input id="c-url" type="text" /></div>
    <div class="field"><label>Project ID</label><input id="c-id" type="text" /></div>
    <button class="btn-primary" onclick="saveCfg()">Conectar</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="app">
    <div class="header">
      <div class="header-top">
        <h1 id="h-month" style="font-size:18px">Cargando...</h1>
        <div class="sync-dot online"><span class="dot"></span> Sincronizado</div>
      </div>
      <button onclick="openBudgets()" style="font-size:12px; background:none; border:1px solid var(--border2); padding:4px 8px; border-radius:4px; cursor:pointer; color:var(--text2)">⚙ Presupuestos</button>
    </div>
    <div class="month-tabs" id="tabs"></div>
    <div class="content" id="main-content"></div>
  </div>
</div>

<div id="modal" class="modal-bg" style="display:none" onclick="this.style.display='none'">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 style="margin-bottom:1rem">Editar Presupuestos</h3>
    <div id="modal-list"></div>
    <button class="btn-primary" style="margin-top:1rem" onclick="saveBudgets()">Cerrar y Guardar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const CATS = [
  {id:'comidas',n:'Comidas',i:'🍽',t:'gasto'},{id:'super',n:'Super',i:'🛒',t:'gasto'},
  {id:'compras',n:'Compras',i:'🛍',t:'gasto'},{id:'varios',n:'Varios',i:'💡',t:'gasto'},
  {id:'gasolina',n:'Gasolina',i:'⛽',t:'gasto'},{id:'viajes',n:'Viajes',i:'✈️',t:'gasto'},
  {id:'ingresos',n:'Ingresos Extra',i:'💰',t:'ingreso'}
];
const MONTHS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

let db, curM = new Date().getMonth(), curY = new Date().getFullYear();
let data = {}, budgets = {};

window.saveCfg = () => {
  const cfg = { apiKey:document.getElementById('c-key').value, databaseURL:document.getElementById('c-url').value, projectId:document.getElementById('c-id').value };
  localStorage.setItem('f_cfg', JSON.stringify(cfg));
  location.reload();
};

async function init() {
  const cfgS = localStorage.getItem('f_cfg');
  if(!cfgS) { document.getElementById('loading').style.display='none'; document.getElementById('setup').style.display='flex'; return; }
  
  const cfg = JSON.parse(cfgS);
  const app = initializeApp(cfg);
  db = getDatabase(app);

  onValue(ref(db, `datos/${curY}_${curM+1}`), s => { data = s.val() || {}; render(); });
  onValue(ref(db, `budgets/${curY}_${curM+1}`), s => { budgets = s.val() || {}; render(); });
  
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
}

function render() {
  const t = document.getElementById('tabs'); t.innerHTML = '';
  MONTHS.forEach((m,i) => {
    const b = document.createElement('button'); b.className = `tab ${i===curM?'active':''}`;
    b.textContent = m; b.onclick = () => { curM=i; init(); };
    t.appendChild(b);
  });

  document.getElementById('h-month').textContent = `${MONTHS[curM]} ${curY}`;
  
  let totalG = 0;
  CATS.filter(c=>c.t==='gasto').forEach(c => { (data[c.id]||[]).forEach(e => totalG += e.a); });

  let h = `<div class="summary-grid">
    <div class="summary-card"><div class="s-label">Gastado</div><div class="s-value">${totalG} €</div></div>
    <div class="summary-card"><div class="s-label">Estado</div><div class="s-value">Activo</div></div>
  </div>`;

  CATS.forEach(c => {
    const spent = (data[c.id]||[]).reduce((a,b)=>a+b.a, 0);
    const bgt = budgets[c.id] || 0;
    const pct = bgt > 0 ? Math.min((spent/bgt)*100, 100) : 0;
    
    h += `<div class="cat-card">
      <div class="cat-header">
        <div class="cat-info"><div class="cat-icon">${c.i}</div><b>${c.n}</b></div>
        <div>${spent}${c.t==='gasto'?' / '+bgt:''} €</div>
      </div>
      ${c.t==='gasto' ? `<div class="progress-bar"><div class="progress-fill ${spent>bgt?'over':''}" style="width:${pct}%"></div></div>` : ''}
      <div id="list-${c.id}">
        ${(data[c.id]||[]).map((e,idx) => `
          <div class="entry-row"><span>${e.d}</span><span>${e.a} € <button onclick="del('${c.id}',${idx})" style="background:none; border:none; color:var(--red); margin-left:5px">×</button></span></div>
        `).join('')}
      </div>
      <div class="add-form">
        <input id="d-${c.id}" placeholder="Concepto" />
        <input id="a-${c.id}" type="number" placeholder="€" style="width:60px" />
        <button onclick="add('${c.id}')">Add</button>
      </div>
    </div>`;
  });
  document.getElementById('main-content').innerHTML = h;
}

window.add = (id) => {
  const dInput = document.getElementById(`d-${id}`), aInput = document.getElementById(`a-${id}`);
  const d = dInput.value || 'Gasto', a = parseFloat(aInput.value);
  if(!a) return;
  const list = data[id] || [];
  list.push({d, a});
  set(ref(db, `datos/${curY}_${curM+1}/${id}`), list);
};

window.del = (id, idx) => {
  const list = data[id];
  list.splice(idx, 1);
  set(ref(db, `datos/${curY}_${curM+1}/${id}`), list);
};

window.openBudgets = () => {
  const list = document.getElementById('modal-list');
  list.innerHTML = CATS.filter(c=>c.t==='gasto').map(c => `
    <div class="modal-row"><span>${c.i} ${c.n}</span><input id="b-${c.id}" type="number" value="${budgets[c.id]||0}" /></div>
  `).join('');
  document.getElementById('modal').style.display='flex';
};

window.saveBudgets = () => {
  const newB = {};
  CATS.filter(c=>c.t==='gasto').forEach(c => { newB[c.id] = parseFloat(document.getElementById(`b-${c.id}`).value)||0; });
  set(ref(db, `budgets/${curY}_${curM+1}`), newB);
  document.getElementById('modal').style.display='none';
};

init();
</script>
</body>
</html>
