<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Mis Finanzas" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Mis Finanzas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F7F6F2;--surface:#FFFFFF;--surface2:#F0EFE9;
    --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
    --text:#1A1A17;--text2:#6B6A64;--text3:#9E9D97;
    --green:#3B6D11;--green-bg:#EAF3DE;--green-mid:#639922;
    --amber:#854F0B;--amber-bg:#FAEEDA;--amber-mid:#BA7517;
    --red:#A32D2D;--red-bg:#FCEBEB;--red-mid:#E24B4A;
    --accent:#1A1A17;--radius:12px;--radius-sm:8px;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#111110;--surface:#1C1C1A;--surface2:#252523;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --text:#F0EFE9;--text2:#9E9D97;--text3:#6B6A64;
    --green:#97C459;--green-bg:#17340A;--green-mid:#639922;
    --amber:#EF9F27;--amber-bg:#412402;--amber-mid:#BA7517;
    --red:#F09595;--red-bg:#501313;--red-mid:#E24B4A;--accent:#F0EFE9;
  }}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'DM Sans','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5;}

  .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--text2);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @keyframes slideup{from{transform:translateY(40px)}to{transform:translateY(0)}}

  .loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text2);font-size:14px;}
  .fullpage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem;}
  .card{background:var(--surface);border:.5px solid var(--border);border-radius:20px;padding:2rem 1.5rem;width:100%;max-width:460px;}
  .card h1{font-size:22px;font-weight:600;letter-spacing:-.03em;margin-bottom:.5rem;}
  .card .sub{font-size:14px;color:var(--text2);margin-bottom:1.75rem;line-height:1.6;}
  .field{margin-bottom:1rem;}
  .field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
  .field input{width:100%;font-family:'DM Mono',monospace;font-size:13px;padding:10px 12px;border:.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);outline:none;}
  .field input:focus{border-color:var(--accent);}
  .btn-primary{width:100%;padding:13px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--radius);font-size:15px;font-family:inherit;font-weight:500;cursor:pointer;}
  .err-msg{font-size:12px;color:var(--red);margin-top:.5rem;display:none;}

  .card.login-card{text-align:center;max-width:380px;padding:2.5rem 2rem;}
  .login-icon{font-size:40px;margin-bottom:1rem;}
  .card.login-card p{font-size:14px;color:var(--text2);margin-bottom:2rem;line-height:1.6;}
  .google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);font-family:inherit;font-size:15px;font-weight:500;color:var(--text);cursor:pointer;transition:background .15s;}
  .google-btn:hover{background:var(--surface2);}
  .google-btn svg{width:20px;height:20px;flex-shrink:0;}

  .app{max-width:520px;margin:0 auto;}
  .header{background:var(--surface);border-bottom:.5px solid var(--border);padding:1rem 1.25rem 0;position:sticky;top:0;z-index:20;}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:.75rem;}
  .header h1{font-size:18px;font-weight:600;letter-spacing:-.02em;}
  .header-month{font-size:12px;color:var(--text2);margin-top:1px;}
  .sync-dot{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);padding:4px 10px;border:.5px solid var(--border2);border-radius:20px;background:var(--surface2);white-space:nowrap;}
  .sync-dot .dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;}
  .sync-dot.online .dot{background:var(--green-mid);}
  .sync-dot.syncing .dot{background:var(--amber-mid);animation:pulse 1s infinite;}
  .cfg-btn{display:flex;align-items:center;gap:5px;background:transparent;border:.5px solid var(--border2);border-radius:var(--radius-sm);padding:5px 10px;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;}
  .header-actions{display:flex;gap:8px;align-items:center;padding-bottom:.75rem;}

  .month-tabs{display:flex;gap:4px;overflow-x:auto;padding:.5rem 1.25rem;scrollbar-width:none;background:var(--surface);}
  .month-tabs::-webkit-scrollbar{display:none;}
  .tab{flex-shrink:0;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:.5px solid var(--border2);background:transparent;color:var(--text2);transition:all .15s;font-family:inherit;}
  .tab.active{background:var(--accent);color:var(--bg);border-color:transparent;}

  .content{padding:1rem 1.25rem 6rem;}
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem;}
  .summary-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:.875rem 1rem;}
  .summary-card.full{grid-column:span 2;}
  .s-label{font-size:11px;color:var(--text2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
  .s-value{font-size:22px;font-weight:600;letter-spacing:-.03em;line-height:1.1;}
  .income-card{background:var(--green-bg)!important;border-color:rgba(99,153,34,.2)!important;}
  .income-card .s-value{color:var(--green)!important;}

  .section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:1.5rem 0 .625rem;}
  .cat-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:.875rem 1rem;margin-bottom:8px;}
  .cat-card.over{border-color:rgba(226,75,74,.4);}
  .cat-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px;}
  .cat-left{display:flex;align-items:center;gap:8px;}
  .cat-icon{width:32px;height:32px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .cat-name{font-size:13px;font-weight:500;}
  .cat-amounts{text-align:right;flex-shrink:0;}
  .cat-spent{font-size:15px;font-weight:600;}
  .progress-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:8px;}
  .progress-fill{height:100%;border-radius:2px;transition:width .4s ease;}
  .p-ok{background:var(--green-mid);}.p-over{background:var(--red-mid);}
  .cat-footer{display:flex;justify-content:space-between;align-items:center;}
  .cat-remaining{font-size:12px;}
  .add-btn{font-size:12px;color:var(--text2);background:transparent;border:none;cursor:pointer;padding:2px 0;text-decoration:underline;text-underline-offset:2px;font-family:inherit;}

  .entries{margin-top:8px;border-top:.5px solid var(--border);padding-top:8px;}
  .entry-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;gap:8px;}
  .entry-desc{font-size:12px;color:var(--text2);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .entry-amount{font-size:13px;font-weight:500;}
  .entry-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:0 0 0 4px;}
  .add-form{margin-top:8px;display:flex;gap:6px;align-items:center;}
  .add-form input{font-family:inherit;font-size:13px;padding:6px 9px;border:.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);outline:none;}
  .add-form button{padding:6px 12px;font-size:13px;font-family:inherit;font-weight:500;border:none;border-radius:var(--radius-sm);background:var(--accent);color:var(--bg);cursor:pointer;}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
  .modal{background:var(--surface);border-radius:20px 20px 0 0;padding:1.25rem;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;}
  .modal-handle{width:36px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 1.25rem;}
  .modal-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:.5px solid var(--border);gap:12px;}
  .modal-row input{width:90px;font-family:inherit;font-size:14px;padding:5px 8px;border:.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);text-align:right;}
  .modal-close{width:100%;margin-top:1rem;padding:13px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--radius);font-size:15px;font-weight:500;cursor:pointer;}
</style>
</head>
<body>

<div id="loading-screen" class="loading">
  <div class="spinner"></div>
  <span>Conectando con Firebase...</span>
</div>

<div id="setup-screen" class="fullpage" style="display:none">
  <div class="card">
    <h1>Configuración</h1>
    <p class="sub">Vincule su proyecto de Firebase para sincronizar sus datos.</p>
    <div class="field"><label>API Key</label><input id="cfg-apikey" type="text" /></div>
    <div class="field"><label>Database URL</label><input id="cfg-dburl" type="text" /></div>
    <div class="field"><label>Project ID</label><input id="cfg-project" type="text" /></div>
    <div class="err-msg" id="setup-error">Por favor, rellene todos los campos.</div>
    <button class="btn-primary" onclick="saveFirebaseConfig()">Guardar y Conectar</button>
  </div>
</div>

<div id="login-screen" class="fullpage" style="display:none">
  <div class="card login-card">
    <div class="login-icon">💰</div>
    <h1>Mis Finanzas</h1>
    <p>Acceda de forma segura con su cuenta de Google.</p>
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Iniciar Sesión
    </button>
  </div>
</div>

<div id="main-app" style="display:none">
  <div class="app">
    <div class="header">
      <div class="header-top">
        <div>
          <h1>Mis Finanzas</h1>
          <div class="header-month" id="header-month">--</div>
        </div>
        <div class="sync-dot online" id="sync-indicator"><span class="dot"></span><span id="sync-text">Sincronizado</span></div>
      </div>
      <div class="header-actions">
        <button class="cfg-btn" onclick="openConfig()">⚙ Presupuestos</button>
        <button class="cfg-btn" onclick="doSignOut()" style="margin-left:auto; opacity:0.6">Salir</button>
      </div>
    </div>
    <div class="month-tabs" id="month-tabs"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-bg" id="cfg-modal" style="display:none" onclick="handleModalBgClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <h2>Presupuestos</h2>
    <div id="modal-rows"></div>
    <button class="modal-close" onclick="closeConfig()">Guardar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
import { 
  getAuth, 
  GoogleAuthProvider, 
  signInWithRedirect, 
  getRedirectResult, 
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence,
  signOut as fbSignOut
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const AUTHORIZED_EMAIL = 'vfernandezgo@gmail.com';
const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MESES_FULL = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const CATEGORIES = [
  {id:'comidas',   name:'Comidas fuera', icon:'🍽', type:'gasto'},
  {id:'compras',   name:'Compras', icon:'🛍', type:'gasto'},
  {id:'varios',    name:'Gastos varios', icon:'💡', type:'gasto'},
  {id:'super',     name:'Supermercado', icon:'🛒', type:'gasto'},
  {id:'regalos',   name:'Regalos', icon:'🎁', type:'gasto'},
  {id:'ingles',    name:'Inglés', icon:'📚', type:'gasto'},
  {id:'limpieza',  name:'Limpieza', icon:'🧹', type:'gasto'},
  {id:'peluqueria',name:'Peluquería', icon:'✂️', type:'gasto'},
  {id:'costura',   name:'Costura', icon:'🪡', type:'gasto'},
  {id:'yoga',      name:'Yoga', icon:'🧘', type:'gasto'},
  {id:'gasolina',  name:'Gasolina', icon:'⛽', type:'gasto'},
  {id:'viajes',    name:'Viajes', icon:'✈️', type:'gasto'},
  {id:'ingresos',  name:'Ingresos extra', icon:'💰', type:'ingreso'},
];

const DEFAULT_BUDGETS = {
  comidas:200,compras:150,varios:100,super:300,regalos:100,
  ingles:80,limpieza:120,peluqueria:60,costura:50,yoga:60,
  gasolina:100,viajes:300
};

let auth, db;
let selectedMonth = new Date().getMonth();
let selectedYear = new Date().getFullYear();
let monthDataCache = {};
let budgetsCache = {...DEFAULT_BUDGETS};
let openForms = {};
let unsubMonth, unsubBudgets;

function monthKey(y,m){ return `${y}_${String(m+1).padStart(2,'0')}`; }
function budgetsPath(y,m){ return `presupuestos/${monthKey(y,m)}`; }
function dataPath(y,m){ return `datos/${monthKey(y,m)}`; }

function show(id) {
  ['loading-screen','setup-screen','login-screen','main-app'].forEach(s => {
    const el = document.getElementById(s);
    if(el) el.style.display = (s === id) ? (id==='main-app'?'block':'flex') : 'none';
  });
}

function setSyncStatus(s){
  const ind = document.getElementById('sync-indicator');
  const txt = document.getElementById('sync-text');
  if(ind) ind.className='sync-dot '+s;
  if(txt) txt.textContent=s==='online'?'Sincronizado':s==='syncing'?'Guardando...':'Error';
}

window.saveFirebaseConfig = function() {
  const cfg = {
    apiKey: document.getElementById('cfg-apikey').value.trim(),
    databaseURL: document.getElementById('cfg-dburl').value.trim(),
    projectId: document.getElementById('cfg-project').value.trim()
  };
  if(cfg.apiKey && cfg.databaseURL && cfg.projectId) {
    localStorage.setItem('fin_firebase_cfg', JSON.stringify(cfg));
    location.reload();
  } else {
    document.getElementById('setup-error').style.display = 'block';
  }
};

async function init() {
  const cfgStr = localStorage.getItem('fin_firebase_cfg');
  if(!cfgStr) { show('setup-screen'); return; }
  
  const cfg = JSON.parse(cfgStr);
  try {
    const app = initializeApp({
      apiKey: cfg.apiKey,
      databaseURL: cfg.databaseURL,
      projectId: cfg.projectId,
      authDomain: "mis-finanzas-81ac4.firebaseapp.com"
    });

    auth = getAuth(app);
    db = getDatabase(app);

    await setPersistence(auth, browserLocalPersistence);
    
    try {
      await getRedirectResult(auth);
    } catch (e) {
      console.error("Error redirect:", e);
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        if (user.email === AUTHORIZED_EMAIL) {
          show('main-app');
          subscribeMonth();
          subscribeBudgets();
        } else {
          alert("Acceso no autorizado");
          fbSignOut(auth);
        }
      } else {
        show('login-screen');
      }
    });
  } catch(e) {
    console.error("Error init:", e);
    show('setup-screen');
  }
}

window.signInWithGoogle = function() {
  const provider = new GoogleAuthProvider();
  signInWithRedirect(auth, provider);
};

window.doSignOut = function() {
  if(confirm('¿Cerrar sesión?')) fbSignOut(auth);
};

function subscribeMonth(){
  if(unsubMonth) unsubMonth();
  unsubMonth = onValue(ref(db, dataPath(selectedYear, selectedMonth)), snap => {
    monthDataCache = snap.val() || {};
    render();
  });
}

function subscribeBudgets(){
  if(unsubBudgets) unsubBudgets();
  unsubBudgets = onValue(ref(db, budgetsPath(selectedYear, selectedMonth)), snap => {
    budgetsCache = snap.val() ? {...DEFAULT_BUDGETS, ...snap.val()} : {...DEFAULT_BUDGETS};
    render();
  });
}

function formatEur(n){ return (n||0).toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:2})+' €'; }
function totalSpent(catId){ return (monthDataCache[catId]||[]).reduce((s,e)=>s+(e.amount||0),0); }

function render(){
  const tabs = document.getElementById('month-tabs');
  if(!tabs) return;
  tabs.innerHTML = '';
  MESES.forEach((m,i)=>{
    const btn = document.createElement('button');
    btn.className = 'tab' + (i===selectedMonth ? ' active' : '');
    btn.textContent = m;
    btn.onclick = () => { selectedMonth = i; subscribeMonth(); subscribeBudgets(); };
    tabs.appendChild(btn);
  });

  document.getElementById('header-month').textContent = MESES_FULL[selectedMonth] + ' ' + selectedYear;
  
  const gastos = CATEGORIES.filter(c=>c.type==='gasto');
  const ingresos = CATEGORIES.filter(c=>c.type==='ingreso');
  let totalG = 0; gastos.forEach(c => totalG += totalSpent(c.id));
  let totalI = 0; ingresos.forEach(c => totalI += totalSpent(c.id));
  const presTotal = gastos.reduce((s,c) => s + (budgetsCache[c.id]||0), 0);
  const restante = presTotal - totalG;

  let html = `
    <div class="summary-grid">
      <div class="summary-card"><div class="s-label">Gastado</div><div class="s-value" style="color:var(--red-mid)">${formatEur(totalG)}</div></div>
      <div class="summary-card"><div class="s-label">Restante</div><div class="s-value" style="color:${restante<0?'var(--red-mid)':'var(--green-mid)'}">${formatEur(restante)}</div></div>
      <div class="summary-card full income-card"><div class="s-label">Ingresos extra</div><div class="s-value">${formatEur(totalI)}</div></div>
    </div>
    <div class="section-title">Categorías</div>`;

  gastos.forEach(cat => {
    const spent = totalSpent(cat.id);
    const budget = budgetsCache[cat.id]||0;
    const pct = budget > 0 ? Math.min((spent/budget)*100, 100) : 0;
    const isOver = spent > budget && budget > 0;
    html += `
      <div class="cat-card ${isOver?'over':''}">
        <div class="cat-header">
          <div class="cat-left"><div class="cat-icon">${cat.icon}</div><span class="cat-name">${cat.name}</span></div>
          <div class="cat-amounts"><b>${formatEur(spent)}</b> / <small>${formatEur(budget)}</small></div>
        </div>
        <div class="progress-bar"><div class="progress-fill ${isOver?'p-over':'p-ok'}" style="width:${pct}%"></div></div>
        <div class="cat-footer">
            <span class="cat-remaining">${isOver?'Excedido':'Queda'} ${formatEur(Math.abs(budget-spent))}</span>
            <button class="add-btn" onclick="toggleForm('${cat.id}')">${openForms[cat.id]?'Cerrar':'+ Añadir'}</button>
        </div>
        ${renderEntries(cat.id, monthDataCache[cat.id]||[])}
      </div>`;
  });

  html += `<div class="section-title">Ingresos</div>`;
  ingresos.forEach(cat => {
    html += `
    <div class="cat-card income-card">
        <div class="cat-header">
          <div class="cat-left"><div class="cat-icon">${cat.icon}</div><span class="cat-name">${cat.name}</span></div>
          <div class="cat-amounts"><b>${formatEur(totalSpent(cat.id))}</b></div>
        </div>
        <div class="cat-footer"><span></span><button class="add-btn" onclick="toggleForm('${cat.id}')">${openForms[cat.id]?'Cerrar':'+ Añadir'}</button></div>
        ${renderEntries(cat.id, monthDataCache[cat.id]||[])}
    </div>`;
  });
  document.getElementById('content').innerHTML = html;
}

function renderEntries(catId, entries){
  if(!openForms[catId] && entries.length === 0) return '';
  let h = '<div class="entries">';
  entries.forEach((e, idx) => {
    h += `<div class="entry-row">
      <span class="entry-desc">${e.desc}</span>
      <span class="entry-amount">${formatEur(e.amount)}</span>
      <button class="entry-del" onclick="deleteEntry('${catId}', ${idx})">×</button>
    </div>`;
  });
  if(openForms[catId]){
    h += `<div class="add-form">
      <input type="text" id="in-desc-${catId}" placeholder="Cosa" style="flex:2" />
      <input type="number" id="in-amt-${catId}" placeholder="€" style="flex:1" />
      <button onclick="addEntry('${catId}')">OK</button>
    </div>`;
  }
  return h + '</div>';
}

window.toggleForm = (id) => { openForms[id] = !openForms[id]; render(); };

window.addEntry = async (catId) => {
  const desc = document.getElementById(`in-desc-${catId}`).value || 'Gasto';
  const amount = parseFloat(document.getElementById(`in-amt-${catId}`).value);
  if(!amount) return;
  setSyncStatus('syncing');
  const newData = {...monthDataCache};
  if(!newData[catId]) newData[catId] = [];
  newData[catId].push({desc, amount, date: new Date().toISOString()});
  await set(ref(db, dataPath(selectedYear, selectedMonth)), newData);
  openForms[catId] = false;
  setSyncStatus('online');
};

window.deleteEntry = async (catId, idx) => {
  if(!confirm('¿Eliminar?')) return;
  const newData = {...monthDataCache};
  newData[catId].splice(idx, 1);
  await set(ref(db, dataPath(selectedYear, selectedMonth)), newData);
};

window.openConfig = () => {
    let h = '';
    CATEGORIES.filter(c=>c.type==='gasto').forEach(cat => {
        h += `<div class="modal-row">
            <div class="modal-label">${cat.icon} ${cat.name}</div>
            <input type="number" id="cfg-val-${cat.id}" value="${budgetsCache[cat.id]||0}" />
        </div>`;
    });
    document.getElementById('modal-rows').innerHTML = h;
    document.getElementById('cfg-modal').style.display = 'flex';
};

window.closeConfig = async () => {
    const newBudgets = {};
    CATEGORIES.filter(c=>c.type==='gasto').forEach(cat => {
        newBudgets[cat.id] = parseFloat(document.getElementById(`cfg-val-${cat.id}`).value) || 0;
    });
    await set(ref(db, budgetsPath(selectedYear, selectedMonth)), newBudgets);
    document.getElementById('cfg-modal').style.display = 'none';
};

window.handleModalBgClick = (e) => { if(e.target.id === 'cfg-modal') document.getElementById('cfg-modal').style.display = 'none'; };

init();
</script>
</body>
</html>
